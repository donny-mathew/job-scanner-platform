name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'charts/**'   # Ignore imageTag commits from this workflow to prevent loops
      - '**.md'

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, scan-service, scoring-service, search-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        working-directory: ./${{ matrix.service }}
        run: mvn test -q

  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, scan-service, scoring-service, search-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-image-tag:
    name: Update imageTag in values.yaml
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update imageTag and imageRegistry in values.yaml
        run: |
          sed -i "s|^imageTag:.*|imageTag: sha-${{ github.sha }}|" charts/job-scanner/values.yaml
          sed -i "s|^imageRegistry:.*|imageRegistry: ghcr.io/${{ github.repository_owner }}|" charts/job-scanner/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/job-scanner/values.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update imageTag to sha-${{ github.sha }} [skip ci]" && \
            git push
