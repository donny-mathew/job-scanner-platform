apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-scanner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/donny-mathew/job-scanner-platform
    targetRevision: HEAD
    path: charts/job-scanner
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
