services:
  # ─────────────────────────── Infrastructure ───────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobscanner
      POSTGRES_PASSWORD: secret
      POSTGRES_MULTIPLE_DATABASES: authdb,scandb,scoringdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ─────────────────────────── Services ───────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USERNAME: jobscanner
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-secret-of-at-least-32-chars}
      JWT_EXPIRY_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scan-service:
    build: ./scan-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scandb
      DB_USERNAME: jobscanner
      DB_PASSWORD: secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-secret-of-at-least-32-chars}
      APP_JOB_PROVIDER: ${APP_JOB_PROVIDER:-mock}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-}
      SCAN_SCHEDULER_ENABLED: "true"
      SCAN_SCHEDULER_INTERVAL_MS: "300000"
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  scoring-service:
    build: ./scoring-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scoringdb
      DB_USERNAME: jobscanner
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-secret-of-at-least-32-chars}
      APP_SCORER: ${APP_SCORER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      SCAN_SERVICE_URL: http://scan-service:8081
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  search-service:
    build: ./search-service
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-secret-of-at-least-32-chars}
      APP_SEARCH_INDEX: ${APP_SEARCH_INDEX:-memory}
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: http
      SERVER_PORT: 8083
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    ports:
      - "8090:8090"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-secret-of-at-least-32-chars}
      AUTH_SERVICE_URL: http://auth-service:8080
      SCAN_SERVICE_URL: http://scan-service:8081
      SCORING_SERVICE_URL: http://scoring-service:8082
      SEARCH_SERVICE_URL: http://search-service:8083
      RATE_LIMIT_REPLENISH_RATE: ${RATE_LIMIT_REPLENISH_RATE:-20}
      RATE_LIMIT_BURST_CAPACITY: ${RATE_LIMIT_BURST_CAPACITY:-40}
      SERVER_PORT: 8090
    depends_on:
      auth-service:
        condition: service_started
      scan-service:
        condition: service_started
      scoring-service:
        condition: service_started
      search-service:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data:
