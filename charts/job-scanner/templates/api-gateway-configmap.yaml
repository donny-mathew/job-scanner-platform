apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  labels:
    app: api-gateway
    {{- include "job-scanner.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.apiGateway.port | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  AUTH_SERVICE_URL: http://auth-service:{{ .Values.authService.port }}
  SCAN_SERVICE_URL: http://scan-service:{{ .Values.scanService.port }}
  SCORING_SERVICE_URL: http://scoring-service:{{ .Values.scoringService.port }}
  SEARCH_SERVICE_URL: http://search-service:{{ .Values.searchService.port }}
  RATE_LIMIT_REPLENISH_RATE: {{ .Values.apiGateway.rateLimitReplenishRate | quote }}
  RATE_LIMIT_BURST_CAPACITY: {{ .Values.apiGateway.rateLimitBurstCapacity | quote }}
