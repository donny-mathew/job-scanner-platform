apiVersion: v1
kind: Secret
metadata:
  name: job-scanner-secrets
  labels:
    {{- include "job-scanner.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.jwtSecret | quote }}
  db-password: {{ .Values.postgres.password | quote }}
  anthropic-api-key: {{ .Values.scoringService.anthropicApiKey | quote }}
  apify-token: {{ .Values.scanService.apifyToken | quote }}
