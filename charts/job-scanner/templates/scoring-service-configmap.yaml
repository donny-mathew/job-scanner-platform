apiVersion: v1
kind: ConfigMap
metadata:
  name: scoring-service-config
  labels:
    app: scoring-service
    {{- include "job-scanner.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.scoringService.port | quote }}
  DB_HOST: {{ .Values.postgres.host | quote }}
  DB_PORT: {{ .Values.postgres.port | quote }}
  DB_NAME: "scoringdb"
  DB_USERNAME: {{ .Values.postgres.username | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  APP_SCORER: {{ .Values.scoringService.scorer | quote }}
  ANTHROPIC_MODEL: {{ .Values.scoringService.anthropicModel | quote }}
  SCAN_SERVICE_URL: http://scan-service:{{ .Values.scanService.port }}
